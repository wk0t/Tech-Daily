# Décrit le projet Xcode. L'outil "xcodegen" génère le .xcodeproj à partir de ce
# fichier (voir la recette GitHub Actions .github/workflows/build-ios.yml).
name: TechCyberDaily
options:
  bundleIdPrefix: com.wk0t
  deploymentTarget:
    iOS: "14.0"
targets:
  TechCyberDaily:
    type: application
    platform: iOS
    sources:
      - Sources
    resources:
      - Resources
    info:
      path: Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wk0t.techcyberdaily
        TARGETED_DEVICE_FAMILY: "1,2"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
