name: Build iOS (.ipa non signé)

# À lancer à la main depuis l'onglet Actions -> "Run workflow".
# Produit un .ipa NON SIGNÉ : tu l'installes ensuite sur ton iPhone via
# AltStore / Sideloadly (qui le re-signe avec ton Apple ID). Dans l'UE, la DMA
# autorise ce sideloading.
on:
  workflow_dispatch:

jobs:
  ios:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Installer XcodeGen
        run: brew install xcodegen

      - name: Copier l'app web dans les ressources
        run: |
          mkdir -p ios/Resources
          cp android/assets/index.html ios/Resources/index.html

      - name: Générer le projet Xcode
        run: cd ios && xcodegen generate

      - name: Compiler (sans signature)
        run: |
          cd ios
          xcodebuild \
            -project TechCyberDaily.xcodeproj \
            -scheme TechCyberDaily \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

      - name: Empaqueter en .ipa
        run: |
          cd ios/build/Build/Products/Release-iphoneos
          mkdir -p Payload
          cp -R TechCyberDaily.app Payload/
          zip -qr "$GITHUB_WORKSPACE/TechCyberDaily-unsigned.ipa" Payload

      - name: Publier l'artefact
        uses: actions/upload-artifact@v4
        with:
          name: TechCyberDaily-iOS-unsigned
          path: TechCyberDaily-unsigned.ipa
