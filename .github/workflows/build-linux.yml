name: Build Linux (.AppImage)

# Lance-le à la main (onglet Actions -> "Run workflow") ou automatiquement
# quand tu pousses un tag de version (ex : v1.0.1).
on:
  workflow_dispatch:
  push:
    tags: ['v*']

# Nécessaire pour que l'étape "Joindre à la release" puisse écrire sur la release.
permissions:
  contents: write

jobs:
  appimage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Dépendances
        run: |
          sudo apt-get update
          sudo apt-get install -y wget file libfuse2

      - name: Construire l'AppImage
        run: |
          chmod +x linux/build_appimage.sh
          ./linux/build_appimage.sh

      - name: Publier l'artefact
        uses: actions/upload-artifact@v4
        with:
          name: TechCyberDaily-AppImage
          path: linux/TechCyberDaily-x86_64.AppImage

      - name: Joindre à la release (si tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: linux/TechCyberDaily-x86_64.AppImage
